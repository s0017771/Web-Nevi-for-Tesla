<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>내 웹 프로그램</title>
<style>
  :root{
    --bg:#0a0e14; --surface:#121821; --surface2:#19212d;
    --line:#26303d; --text:#e8edf2; --muted:#8694a2;
    --good:#34e1a0; --warn:#ffcf5c; --accent:#3b82f6; --gold:#e8b53a;
    --sans:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);
    display:flex;flex-direction:column;align-items:center;padding:32px 20px 40px;
  }
  header{text-align:center;margin-bottom:28px}
  header h1{font-size:1.7rem;font-weight:800;letter-spacing:.02em}
  header h1 span{margin-right:10px}
  header p{margin-top:8px;font-size:.9rem;color:var(--muted)}

  .grid{
    display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;
    width:100%;max-width:860px;
  }
  @media (max-width:560px){ .grid{grid-template-columns:1fr} }
  a.app{
    display:flex;align-items:center;gap:18px;text-decoration:none;color:var(--text);
    background:var(--surface);border:1px solid var(--line);border-radius:20px;
    padding:26px 22px;transition:transform .08s ease,border-color .15s ease,background .15s ease;
    position:relative;overflow:hidden;
  }
  a.app:hover{border-color:var(--accent);background:var(--surface2)}
  a.app:active{transform:scale(.97)}
  .icon{
    flex:0 0 76px;height:76px;border-radius:18px;background:var(--surface2);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    font-size:2.5rem;
  }
  a.app h2{font-size:1.25rem;font-weight:800}
  a.app p{margin-top:6px;font-size:.85rem;color:var(--muted);line-height:1.5}
  .badge{
    position:absolute;top:14px;right:14px;font-size:.66rem;font-weight:700;
    padding:4px 10px;border-radius:12px;letter-spacing:.05em;
  }
  .badge.new{background:var(--good);color:#06281c}
  .badge.soon{background:var(--warn);color:#3d2f07}
  footer{margin-top:34px;font-size:.72rem;color:#4d5a68;text-align:center;line-height:1.8}
</style>
</head>
<body>
<header>
  <h1><span>&#128640;</span>내 웹 프로그램</h1>
  <p>사용할 프로그램을 선택하세요</p>
</header>

<div class="grid">
  <a class="app" href="navi.html" id="app-navi">
    <div class="icon">&#129517;</div>
    <div>
      <h2>카카오 웹 내비</h2>
      <p>테슬라 브라우저용 내비게이션 &middot; 목적지 검색 &middot; 실시간 안내</p>
    </div>
  </a>

  <a class="app" href="golf.html" id="app-golf">
    <span class="badge new">NEW</span>
    <div class="icon">&#9971;</div>
    <div>
      <h2>골프 캐디</h2>
      <p>GPS 거리측정 &middot; 그린 경사 읽기 &middot; 클럽별 비거리 기록</p>
    </div>
  </a>

  <a class="app" href="roulette.html" id="app-roulette">
    <span class="badge soon">파일 대기</span>
    <div class="icon">&#127920;</div>
    <div>
      <h2>카지노 룰렛</h2>
      <p>룰렛 게임</p>
    </div>
  </a>

  <a class="app" href="japanese.html" id="app-japanese">
    <span class="badge soon">파일 대기</span>
    <div class="icon">&#127471;&#127477;</div>
    <div>
      <h2>일어공부</h2>
      <p>일본어 학습</p>
    </div>
  </a>
</div>

<footer>
  s0017771 &middot; Web Apps<br>
  홈 화면(즐겨찾기)에 이 페이지를 추가해 두면 모든 프로그램을 여기서 실행할 수 있습니다
</footer>
</body>
</html>
