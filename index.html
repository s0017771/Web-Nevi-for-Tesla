<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>브로가드 카 메뉴</title>

<script>
/* ============================================================
   프로그램 주소 설정 — 여기만 고치면 됩니다!
   새 프로그램이 완성되면 "" 안에 주소를 넣으세요.
   예) golf: "https://my-golf.vercel.app"
   같은 저장소 파일이면 파일 이름만 넣어도 됩니다. 예) "golf.html"
   ============================================================ */
var LINKS = {
  nevi:     "nevi.html",       // 🧭 카카오 웹 내비
  roulette: "roulette.html",   // 🎰 아메리칸 룰렛
  golf:     "golf.html",       // ⛳ 골프측정기 (GPS 거리 · 그린 경사 · 클럽 비거리)
  japanese: "nihongo.html",    // 🇯🇵 일어공부 (니혼고 랩)
  ruler:    "ruler.html"       // 📏 모바일 자 (사진 기준물 치수 측정)
};
</script>

<style>
  :root{
    --bg:#0a0e14; --card:#141b26; --card2:#19212d; --line:#26303d;
    --text:#e8edf2; --muted:#8694a2; --accent:#3b82f6;
    --sans:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse at 50% -10%, #131c2a 0%, var(--bg) 60%);
    color:var(--text); font-family:var(--sans);
    display:flex; flex-direction:column; min-height:100vh;
  }
  header{text-align:center; padding:34px 16px 10px}
  header h1{font-size:1.9rem; font-weight:800; letter-spacing:.06em}
  header p{color:var(--muted); font-size:.95rem; margin-top:6px}

  main{
    flex:1; width:100%; max-width:1100px; margin:0 auto; padding:24px 20px 40px;
    display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px;
    align-content:center;
  }
  .tile{
    position:relative; display:flex; align-items:center; gap:20px; text-decoration:none;
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid var(--line); border-radius:22px; padding:30px 26px;
    color:var(--text); min-height:130px; cursor:pointer;
    transition:transform .09s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .tile:hover{border-color:var(--accent); box-shadow:0 8px 30px rgba(59,130,246,.18)}
  .tile:active{transform:scale(.975)}
  .tile .icon{
    flex:0 0 74px; height:74px; border-radius:18px; background:#0d1420;
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:2.4rem;
  }
  .tile h2{font-size:1.35rem; font-weight:800}
  .tile p{font-size:.88rem; color:var(--muted); margin-top:5px; line-height:1.5}
  .tile.off{opacity:.55; cursor:default}
  .tile.off:hover{border-color:var(--line); box-shadow:none}
  .tile .soon{
    position:absolute; top:14px; right:16px; font-size:.72rem; font-weight:700;
    color:#ffcf5c; border:1px solid #ffcf5c66; border-radius:999px; padding:3px 10px;
  }
  #toast{
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:#19212df5; border:1px solid var(--line); border-radius:12px;
    padding:12px 20px; font-size:.95rem; display:none; z-index:5;
  }
  #toast.show{display:block}
  footer{text-align:center; padding:16px; font-size:.75rem; color:#5b6b7c}
</style>
</head>
<body>
<header>
  <h1>&#128663; 브로가드 카 메뉴</h1>
  <p>사용할 프로그램을 선택하세요</p>
</header>

<main id="menu"></main>
<div id="toast"></div>
<footer>Broguard &middot; Tesla browser friendly</footer>

<script>
(function(){
  var APPS = [
    { key:"nevi",     icon:"\u{1F9ED}", name:"카카오 웹 내비",  desc:"목적지 검색 · 도로 경로 · 음성 안내 · 내 위치 추적" },
    { key:"roulette", icon:"\u{1F3B0}", name:"아메리칸 룰렛",   desc:"구슬 애니메이션 · 칩 베팅 · 0/00 포함 38칸 — 가상 칩 게임" },
    { key:"golf",     icon:"⛳",    name:"골프측정기",      desc:"GPS 거리측정 · 그린 경사 읽기 · 클럽별 비거리 기록" },
    { key:"japanese", icon:"\u{1F1EF}\u{1F1F5}", name:"일어공부", desc:"듀오링고 방식 니혼고 랩 · 히라가나 · 문장·문법 · 조사 · XP · 스트릭 · 복습" },
    { key:"ruler",    icon:"\u{1F4CF}", name:"모바일 자",   desc:"신용카드 등 기준물로 사진 속 물체 치수 측정 · 돋보기 정밀 조준" }
  ];
  var menu=document.getElementById("menu");
  var toastEl=document.getElementById("toast");
  function toast(m){toastEl.textContent=m;toastEl.classList.add("show");
    clearTimeout(toast._t);toast._t=setTimeout(function(){toastEl.classList.remove("show")},3000);}

  APPS.forEach(function(app){
    var url=(LINKS[app.key]||"").trim();
    var el=document.createElement(url?"a":"div");
    el.className="tile"+(url?"":" off");
    el.innerHTML='<div class="icon">'+app.icon+'</div>'
      +'<div><h2>'+app.name+'</h2><p>'+app.desc+'</p></div>'
      +(url?'':'<span class="soon">준비 중</span>');
    if(url){ el.href=url; }
    else { el.addEventListener("click",function(){toast(app.name+"은(는) 아직 준비 중이에요!");}); }
    menu.appendChild(el);
  });
})();
</script>
</body>
</html>
