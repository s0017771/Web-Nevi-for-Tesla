<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GPS 수신 진단</title>
<style>
  :root{
    --bg:#0a0e14; --surface:#121821; --surface2:#19212d;
    --line:#26303d; --text:#e8edf2; --muted:#75828f;
    --good:#34e1a0; --warn:#ffcf5c; --bad:#ff5c6c; --idle:#5a6a7a;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    padding:clamp(14px,2.2vw,28px); line-height:1.4;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:1200px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  h1{font-size:clamp(18px,2.4vw,26px);font-weight:700;letter-spacing:-0.01em;margin:0}
  .hint{color:var(--muted);font-size:clamp(12px,1.3vw,14px);font-family:var(--mono)}

  /* verdict banner */
  .verdict{
    display:flex;align-items:center;gap:16px;
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:clamp(16px,2.4vw,26px);margin-bottom:16px;
  }
  .pulse{
    width:clamp(34px,4.5vw,52px);height:clamp(34px,4.5vw,52px);border-radius:50%;
    background:var(--idle);flex:0 0 auto;position:relative;transition:background .2s;
  }
  .pulse.live{background:var(--good)}
  .pulse.err{background:var(--bad)}
  .pulse.live::after{
    content:"";position:absolute;inset:0;border-radius:50%;
    box-shadow:0 0 0 0 var(--good);animation:ring 1s ease-out infinite;
  }
  @keyframes ring{from{box-shadow:0 0 0 0 rgba(52,225,160,.6)}to{box-shadow:0 0 0 22px rgba(52,225,160,0)}}
  .verdict-text .vmain{font-size:clamp(20px,3.2vw,34px);font-weight:700;letter-spacing:-0.01em}
  .verdict-text .vsub{color:var(--muted);font-size:clamp(13px,1.5vw,16px);margin-top:2px}

  /* hero metrics */
  .hero{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:clamp(14px,2vw,22px)}
  .card .lbl{color:var(--muted);font-family:var(--mono);font-size:clamp(11px,1.2vw,13px);text-transform:uppercase;letter-spacing:.08em}
  .card .big{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;font-size:clamp(34px,7vw,68px);line-height:1.05;margin-top:6px}
  .card .unit{font-size:.4em;color:var(--muted);font-weight:600;margin-left:6px}
  .big.good{color:var(--good)} .big.warn{color:var(--warn)} .big.bad{color:var(--bad)}

  /* secondary grid */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .cell{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:clamp(10px,1.4vw,16px)}
  .cell .lbl{color:var(--muted);font-family:var(--mono);font-size:clamp(10px,1.1vw,12px);text-transform:uppercase;letter-spacing:.06em}
  .cell .val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:clamp(18px,2.4vw,26px);font-weight:600;margin-top:4px}

  /* cadence sparkline */
  .spark{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:clamp(12px,1.6vw,18px);margin-bottom:16px}
  .spark .lbl{color:var(--muted);font-family:var(--mono);font-size:clamp(11px,1.2vw,13px);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .bars{display:flex;align-items:flex-end;gap:3px;height:54px}
  .bar{flex:1;background:var(--good);border-radius:2px 2px 0 0;min-height:3px;opacity:.85}
  .bar.slow{background:var(--warn)} .bar.veryslow{background:var(--bad)}

  /* controls */
  .controls{display:flex;gap:12px;flex-wrap:wrap}
  button{
    font-family:var(--sans);font-size:clamp(16px,2vw,20px);font-weight:600;
    padding:clamp(14px,1.8vw,20px) clamp(20px,3vw,34px);border-radius:14px;border:1px solid var(--line);
    cursor:pointer;flex:1;min-width:160px;color:var(--text);background:var(--surface2);
    transition:transform .05s,background .15s;
  }
  button:active{transform:scale(.98)}
  button.primary{background:var(--good);color:#06281c;border-color:transparent}
  button:disabled{opacity:.4;cursor:not-allowed}
  button:focus-visible{outline:3px solid var(--good);outline-offset:2px}

  .note{color:var(--muted);font-size:clamp(12px,1.3vw,14px);margin-top:14px;font-family:var(--mono)}
  @media (max-width:560px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}
  @media (prefers-reduced-motion:reduce){.pulse.live::after{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>GPS 수신 진단</h1>
    <span class="hint">테슬라 브라우저 · HTTPS 필요</span>
  </header>

  <div class="verdict">
    <div class="pulse" id="pulse"></div>
    <div class="verdict-text">
      <div class="vmain" id="vmain">대기 중</div>
      <div class="vsub" id="vsub">아래 '측정 시작'을 누르면 위치 권한을 요청합니다.</div>
    </div>
  </div>

  <div class="hero">
    <div class="card">
      <div class="lbl">정확도 (낮을수록 좋음)</div>
      <div class="big" id="acc">—<span class="unit">m</span></div>
    </div>
    <div class="card">
      <div class="lbl">갱신 속도</div>
      <div class="big" id="hz">—<span class="unit">Hz</span></div>
    </div>
  </div>

  <div class="grid">
    <div class="cell"><div class="lbl">위도</div><div class="val" id="lat">—</div></div>
    <div class="cell"><div class="lbl">경도</div><div class="val" id="lng">—</div></div>
    <div class="cell"><div class="lbl">속도</div><div class="val" id="spd">—</div></div>
    <div class="cell"><div class="lbl">방향</div><div class="val" id="hdg">—</div></div>
    <div class="cell"><div class="lbl">고도</div><div class="val" id="alt">—</div></div>
    <div class="cell"><div class="lbl">수신 횟수</div><div class="val" id="cnt">0</div></div>
  </div>

  <div class="spark">
    <div class="lbl">최근 갱신 간격 (낮은 막대 = 빠른 갱신)</div>
    <div class="bars" id="bars"></div>
  </div>

  <div class="controls">
    <button class="primary" id="startBtn">측정 시작</button>
    <button id="stopBtn" disabled>측정 중지</button>
  </div>

  <div class="note" id="note">팁: 권한을 한 번 거부하면 팝업이 다시 안 뜰 수 있습니다. 주소창의 위치 아이콘 또는 차량 설정 &gt; 서비스에서 브라우저 데이터를 지운 뒤 재시도하세요.</div>
</div>

<script>
(function(){
  var watchId=null, count=0, lastT=null, intervals=[];
  var $=function(id){return document.getElementById(id)};
  var pulse=$("pulse"), vmain=$("vmain"), vsub=$("vsub");

  function fmt(v,d){return (v==null||isNaN(v))?"—":Number(v).toFixed(d)}

  function setVerdict(state,main,sub){
    pulse.className="pulse"+(state==="live"?" live":state==="err"?" err":"");
    vmain.textContent=main; if(sub!=null) vsub.textContent=sub;
  }

  function renderBars(){
    var b=$("bars"); b.innerHTML="";
    var recent=intervals.slice(-40);
    for(var i=0;i<recent.length;i++){
      var ms=recent[i];
      var h=Math.min(54,Math.max(3,ms/40)); // 2160ms -> full height
      var cls=ms>3000?"bar veryslow":ms>1800?"bar slow":"bar";
      var d=document.createElement("div");
      d.className=cls; d.style.height=h+"px";
      d.title=ms+"ms";
      b.appendChild(d);
    }
  }

  function avgHz(){
    if(intervals.length<2) return null;
    var r=intervals.slice(-8), s=0;
    for(var i=0;i<r.length;i++) s+=r[i];
    var avgMs=s/r.length;
    return avgMs>0?1000/avgMs:null;
  }

  function onPos(p){
    var c=p.coords, now=p.timestamp||Date.now();
    count++; $("cnt").textContent=count;

    if(lastT!=null){intervals.push(now-lastT); if(intervals.length>200) intervals.shift();}
    lastT=now;

    // accuracy
    var a=c.accuracy;
    var accEl=$("acc");
    accEl.innerHTML=fmt(a,0)+'<span class="unit">m</span>';
    accEl.className="big "+(a<=20?"good":a<=50?"warn":"bad");

    // hz
    var hz=avgHz();
    $("hz").innerHTML=(hz==null?"—":fmt(hz,2))+'<span class="unit">Hz</span>';

    $("lat").textContent=fmt(c.latitude,6);
    $("lng").textContent=fmt(c.longitude,6);
    $("spd").textContent=(c.speed==null?"—":fmt(c.speed*3.6,1)+" km/h");
    $("hdg").textContent=(c.heading==null?"—":fmt(c.heading,0)+"°");
    $("alt").textContent=(c.altitude==null?"—":fmt(c.altitude,0)+" m");

    renderBars();

    // overall verdict for nav-viability
    var navOK = (a<=30) && (hz!=null && hz>=0.5);
    if(navOK) setVerdict("live","GPS 수신 정상 — 내비게이션 가능","정확도 양호 + 실시간 갱신 확인됨");
    else if(a>50) setVerdict("live","수신 중 — 정확도 낮음","정확도 "+fmt(a,0)+"m. 하늘이 트인 곳에서 잠시 더 두고 보세요.");
    else if(hz==null || hz<0.5) setVerdict("live","수신 중 — 갱신 느림","위치는 들어오는데 갱신 빈도가 낮습니다.");
    else setVerdict("live","GPS 수신 중","");
  }

  function onErr(e){
    var msg={1:"위치 권한 거부됨",2:"위치 정보 없음",3:"응답 시간 초과"}[e.code]||"오류";
    var sub={
      1:"주소창 위치 아이콘에서 허용으로 바꾸거나 브라우저 데이터를 지운 뒤 재시도하세요.",
      2:"차량 GPS 신호를 잡지 못했습니다. 실외에서 다시 시도하세요.",
      3:"응답이 늦습니다. 신호 탐색을 계속합니다."
    }[e.code]||e.message;
    // timeout은 watch가 계속 도니 치명적 아님
    if(e.code===3){ setVerdict("live","신호 탐색 중…",sub); }
    else { setVerdict("err",msg,sub); }
  }

  function start(){
    if(!("geolocation" in navigator)){
      setVerdict("err","이 브라우저는 위치 기능 미지원","navigator.geolocation 자체가 없습니다.");
      return;
    }
    if(!window.isSecureContext){
      setVerdict("err","HTTPS가 아닙니다","https:// 주소로 열어야 위치 권한을 요청할 수 있습니다.");
      return;
    }
    count=0; lastT=null; intervals=[]; $("cnt").textContent="0";
    setVerdict("idle","신호 탐색 중…","권한 팝업이 뜨면 '허용'을 눌러주세요.");
    $("startBtn").disabled=true; $("stopBtn").disabled=false;
    watchId=navigator.geolocation.watchPosition(onPos,onErr,{
      enableHighAccuracy:true, maximumAge:0, timeout:15000
    });
  }

  function stop(){
    if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
    $("startBtn").disabled=false; $("stopBtn").disabled=true;
    setVerdict("idle","측정 중지됨","다시 시작하려면 '측정 시작'을 누르세요.");
  }

  $("startBtn").addEventListener("click",start);
  $("stopBtn").addEventListener("click",stop);
})();
</script>
</body>
</html>
